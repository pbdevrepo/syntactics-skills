name: Build and release skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build skills and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create skills ZIP
        run: |
          mkdir -p /tmp/flat-skills
          find skills -mindepth 2 -maxdepth 2 -type d -exec cp -r {} /tmp/flat-skills/ \;
          python3 scripts/gen_manifest.py /tmp/flat-skills
          cd /tmp/flat-skills
          zip -r $GITHUB_WORKSPACE/syntactics-skills.zip .

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="skills-$(date +%Y%m%d%H%M%S)"
          gh release create "$TAG" syntactics-skills.zip \
            --title "Skills $TAG" \
            --notes "Auto-release from CI" \
            --latest
