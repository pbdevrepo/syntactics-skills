name: Build and release skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**-workflow/**/SKILL.md'
      - 'skills/**-workflow/**/references/**'

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build skills and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build skill ZIPs
        run: |
          mkdir -p dist
          SKILLS_DIR="skills"
          for workflow_dir in "$SKILLS_DIR"/*-workflow/; do
            [ -d "$workflow_dir" ] || continue
            for skill_dir in "$workflow_dir"*/; do
              [ -d "$skill_dir" ] || continue
              skill="$(basename "$skill_dir")"
              (cd "$workflow_dir" && zip -r "../../dist/${skill}.skill" "$skill/" --quiet)
              echo "  built: dist/${skill}.skill"
            done
          done

      - name: Get version tag
        id: tag
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          echo "tag=release-$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with skill ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Skills Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release from skill changes on main.
          files: dist/*.skill
          fail_on_unmatched_files: false
