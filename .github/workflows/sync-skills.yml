name: Build and release skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**-workflow/**/SKILL.md'
      - 'skills/**-workflow/**/references/**'

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build skills and create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version tag
        id: tag
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          echo "tag=release-$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Skills Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release from skill changes on main.

            ## Changed skills
            See commit diff for changed SKILL.md files.
