name: Validate and sync skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**-workflow/**/SKILL.md'
      - 'skills/**-workflow/**/references/**'

concurrency:
  group: sync-skills
  cancel-in-progress: false

jobs:
  validate:
    name: Validate skill manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: bash scripts/validate.sh

  build-and-release:
    name: Build and release skill ZIPs
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version for changed skills
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bash scripts/bump-version.sh patch
          git diff --quiet || (git add skills/ && git commit -m "chore: bump skill versions [skip ci]")

      - name: Build skill ZIPs and workflow bundles
        run: bash scripts/build.sh

      - name: Get version tag
        id: tag
        run: |
          VERSION=$(date +%Y%m%d%H%M%S)
          echo "tag=release-$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with skill ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Skills Release ${{ steps.tag.outputs.tag }}
          body: |
            Automated release from skill changes on main.

            ## Changed skills
            See commit diff for changed SKILL.md files.
          files: dist/*.zip
          fail_on_unmatched_files: false

  publish-npm:
    name: Publish to npm
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish package
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
